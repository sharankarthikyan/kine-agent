# First CI in the repo — exists to give cfg(windows) code real coverage
# (the Windows Job-Object teardown cannot be executed on the unix dev machine).
name: windows-tests

on:
  push:
    branches: [main, "feat/**"]
  workflow_dispatch:

jobs:
  rust-tests:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable branch, 2026-07-21
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2, 2026-07-21
        with:
          workspaces: src-tauri
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      # tauri-build's build script requires frontendDist (../dist) to exist.
      - run: npm ci
      - run: npm run build
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

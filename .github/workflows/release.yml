name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Gate the whole release on green tests — a red typecheck/unit suite must never
  # ship a build. Runs once on Linux; the platform build matrix waits on it.
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: npm ci

      - name: Typecheck + frontend tests
        run: |
          npx tsc --noEmit
          npm test

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # Build each platform, updater-sign it, and (macOS) Developer-ID code-sign +
  # notarize it. tauri-action aggregates all matrix runs into ONE draft release
  # (with a single latest.json manifest) on this repo. The publish job below flips
  # that draft live once every platform build has attached its assets — the app's
  # updater endpoint points here.
  #
  # macOS signing/notarization is driven ENTIRELY by the APPLE_* env on the build
  # step below. When those secrets are set, tauri-action imports the certificate
  # into a temporary keychain, signs with the hardened runtime, and notarizes via
  # notarytool — no manual keychain steps needed. When they are ABSENT (e.g. before
  # the secrets are configured) tauri-action falls back to ad-hoc signing, so the
  # pipeline still succeeds; the download is simply flagged by Gatekeeper until the
  # secrets exist. Required repo secrets (Settings → Secrets and variables → Actions):
  #   APPLE_CERTIFICATE           base64 of the "Developer ID Application" .p12
  #                               (openssl base64 -A -in cert.p12 -out cert.txt)
  #   APPLE_CERTIFICATE_PASSWORD  the .p12 export password
  #   APPLE_SIGNING_IDENTITY      e.g. "Developer ID Application: Name (TEAMID)"
  #   APPLE_ID                    Apple Developer account email
  #   APPLE_PASSWORD              an app-specific password for that Apple ID
  #   APPLE_TEAM_ID               the 10-char Team ID
  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - os: ubuntu-22.04
            args: ''
            rust-targets: ''
          - os: windows-latest
            args: ''
            rust-targets: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: npm ci

      - name: Build + sign + attach to draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — MUST match the pubkey compiled into tauri.conf.json.
          # Generate once with: npx tauri signer generate -w ~/.tauri/kineloop.key
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS Developer-ID signing + notarization. Only consumed on the macOS
          # runner; unused (harmless) on Linux/Windows. Empty when unset → ad-hoc build.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Kine Agent ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false

  # Once every platform build has attached its assets to the draft, flip the
  # release live. The app's updater reads THIS repo's latest.json directly, so
  # there is nothing to mirror and no cross-repo token to manage.
  publish:
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Publish the drafted release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false --latest
